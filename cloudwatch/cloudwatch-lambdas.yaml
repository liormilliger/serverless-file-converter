AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudWatch Lambdas - Centralized monitoring, observability, and alerting
  for AWS Lambda functions and Step Functions. Includes IAM roles, CloudWatch
  Log Groups, Alarms, Dashboard, X-Ray tracing, SNS alerting, and Metric Filters.

# ─────────────────────────────────────────
# PARAMETERS
# ─────────────────────────────────────────
Parameters:
  AlertEmail:
    Type: String
    Description: Email address to receive CloudWatch alarm notifications
    Default: lior.milliger@polustech.com

  LambdaFunctionNames:
    Type: CommaDelimitedList
    Description: Comma-separated list of Lambda function names to monitor
    Default: 3-tier-data-digestion-identifier,3-tier-data-digestion-converter,3-tier-data-digestion-uploader

  StepFunctionArns:
    Type: CommaDelimitedList
    Description: Comma-separated list of Step Function State Machine ARNs to monitor
    Default: arn:aws:states:us-east-1:704505749045:stateMachine:3-tier-data-digestion-pipeline

  ErrorAlarmThreshold:
    Type: Number
    Description: Number of Lambda errors to trigger an alarm
    Default: 1

  ThrottleAlarmThreshold:
    Type: Number
    Description: Number of Lambda throttles to trigger an alarm
    Default: 3

  LogRetentionDays:
    Type: Number
    Description: Number of days to retain CloudWatch logs
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365]

  Environment:
    Type: String
    Description: Deployment environment
    Default: development
    AllowedValues: [development, staging, production]

# ─────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────
Resources:

  # ───────────────────────────────────────
  # SNS TOPIC — Alert notifications
  # ───────────────────────────────────────
  AlertingSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "cloudwatch-lambda-alerts-${Environment}"
      DisplayName: Lambda & Step Function Alerts
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  AlertingSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertingSnsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ───────────────────────────────────────
  # IAM ROLES
  # ───────────────────────────────────────
  LambdaObservabilityRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "lambda-observability-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: LambdaCloudWatchMetricsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PublishCustomMetrics
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: "*"
              - Sid: WriteLogsPolicy
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  StepFunctionsObservabilityRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "stepfunctions-observability-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: StepFunctionsLoggingPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: StepFunctionsCloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutLogEvents
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  CloudWatchReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "cloudwatch-readonly-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSXrayReadOnlyAccess
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ───────────────────────────────────────
  # LOG GROUPS
  # ───────────────────────────────────────
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/observability-${Environment}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Environment
          Value: !Ref Environment

  StepFunctionsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/observability-${Environment}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ───────────────────────────────────────
  # METRIC FILTERS
  # ───────────────────────────────────────
  LambdaErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LambdaLogGroup
      FilterPattern: "?ERROR ?Error ?error ?Exception ?exception ?EXCEPTION"
      MetricTransformations:
        - MetricName: LambdaApplicationErrors
          MetricNamespace: !Sub "Custom/Lambda/${Environment}"
          MetricValue: "1"
          DefaultValue: 0

  LambdaTimeoutMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LambdaLogGroup
      FilterPattern: "Task timed out"
      MetricTransformations:
        - MetricName: LambdaTimeouts
          MetricNamespace: !Sub "Custom/Lambda/${Environment}"
          MetricValue: "1"
          DefaultValue: 0

  # ───────────────────────────────────────
  # CLOUDWATCH ALARMS
  # ───────────────────────────────────────
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Lambda-Errors-${Environment}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ErrorAlarmThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertingSnsTopic]

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Lambda-Throttles-${Environment}"
      Namespace: AWS/Lambda
      MetricName: Throttles
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ThrottleAlarmThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions: [!Ref AlertingSnsTopic]

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Lambda-HighDuration-${Environment}"
      Namespace: AWS/Lambda
      MetricName: Duration
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertingSnsTopic]

  StepFunctionFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "StepFunctions-ExecutionsFailed-${Environment}"
      Namespace: AWS/States
      MetricName: ExecutionsFailed
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: StateMachineArn
          Value: !Select [0, !Ref StepFunctionArns]
      AlarmActions: [!Ref AlertingSnsTopic]

  StepFunctionTimedOutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "StepFunctions-ExecutionsTimedOut-${Environment}"
      Namespace: AWS/States
      MetricName: ExecutionsTimedOut
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: StateMachineArn
          Value: !Select [0, !Ref StepFunctionArns]
      AlarmActions: [!Ref AlertingSnsTopic]

  StepFunctionThrottledAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "StepFunctions-ExecutionsThrottled-${Environment}"
      Namespace: AWS/States
      MetricName: ExecutionsThrottled
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: StateMachineArn
          Value: !Select [0, !Ref StepFunctionArns]
      AlarmActions: [!Ref AlertingSnsTopic]

  # ───────────────────────────────────────
  # CLOUDWATCH DASHBOARD
  # ───────────────────────────────────────
  ObservabilityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "CloudWatch-Lambdas-${Environment}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {
                "markdown": "# 🔍 Lambda & Step Functions — Observability Dashboard (${Environment})"
              }
            },
            {
              "type": "alarm",
              "x": 0, "y": 1, "width": 24, "height": 2,
              "properties": {
                "title": "🚨 Active Alarms",
                "alarms": [
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${LambdaErrorAlarm}",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${LambdaThrottleAlarm}",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${LambdaDurationAlarm}",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${StepFunctionFailedAlarm}",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${StepFunctionTimedOutAlarm}",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${StepFunctionThrottledAlarm}"
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 3, "width": 8, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda — Invocations",
                "view": "timeSeries",
                "stat": "Sum",
                "period": 60,
                "metrics": [ ["AWS/Lambda", "Invocations"] ],
                "yAxis": { "left": { "min": 0 } }
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 3, "width": 8, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda — Errors",
                "view": "timeSeries",
                "stat": "Sum",
                "period": 60,
                "metrics": [ ["AWS/Lambda", "Errors", { "color": "#d62728" }] ],
                "yAxis": { "left": { "min": 0 } }
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 3, "width": 8, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda — Throttles",
                "view": "timeSeries",
                "stat": "Sum",
                "period": 60,
                "metrics": [ ["AWS/Lambda", "Throttles", { "color": "#ff7f0e" }] ],
                "yAxis": { "left": { "min": 0 } }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 9, "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda — Duration (Avg / P99)",
                "view": "timeSeries",
                "stat": "Average",
                "period": 60,
                "metrics": [
                  ["AWS/Lambda", "Duration", { "label": "Avg Duration" }],
                  ["AWS/Lambda", "Duration", { "label": "p99 Duration", "stat": "p99", "color": "#9467bd" }]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 9, "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda — Concurrent Executions",
                "view": "timeSeries",
                "stat": "Maximum",
                "period": 60,
                "metrics": [ ["AWS/Lambda", "ConcurrentExecutions"] ]
              }
            },
            {
              "type": "text",
              "x": 0, "y": 15, "width": 24, "height": 1,
              "properties": { "markdown": "## ⚙️ Step Functions" }
            },
            {
              "type": "metric",
              "x": 0, "y": 16, "width": 8, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Step Functions — Success/Failure",
                "view": "timeSeries",
                "metrics": [
                  ["AWS/States", "ExecutionsSucceeded", { "color": "#2ca02c" }],
                  ["AWS/States", "ExecutionsFailed", { "color": "#d62728" }]
                ]
              }
            },
            {
              "type": "log",
              "x": 0, "y": 22, "width": 24, "height": 6,
              "properties": {
                "title": "Lambda — Recent Errors",
                "query": "SOURCE '/aws/lambda/observability-${Environment}' | fields @timestamp, @message | filter @message like /ERROR|Exception/ | sort @timestamp desc | limit 20",
                "region": "${AWS::Region}",
                "view": "table"
              }
            }
          ]
        }

# ─────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────
Outputs:
  DashboardUrl:
    Description: URL to the CloudWatch Observability Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=CloudWatch-Lambdas-${Environment}"
  LambdaObservabilityRoleArn:
    Value: !GetAtt LambdaObservabilityRole.Arn
  StepFunctionsObservabilityRoleArn:
    Value: !GetAtt StepFunctionsObservabilityRole.Arn

    