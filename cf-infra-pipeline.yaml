AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Multi-stage S3 File Conversion Pipeline'

Parameters:
  OwnerName:
    Type: String
    Default: Lior Milliger
  OwnerUser:
    Type: String
    Default: liorm-at-polus
  RawBucketName:
    Type: String
    Default: liorm-polus-raw-data
  StructuredBucketName:
    Type: String
    Default: liorm-polus-structured-data

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 30
    Tags:
      Name: !Ref OwnerName
      User: !Ref OwnerUser
    Environment:
      Variables:
        MANIFEST_TABLE: !Ref ManifestTable
        RAW_BUCKET: !Ref RawBucketName
        STRUCTURED_BUCKET: !Ref StructuredBucketName
        OWNER_NAME: !Ref OwnerName

Resources:

  # -----------------------------------------------------------------------
  # DynamoDB — Manifest Table
  # Tracks every file: PROCESSING | COMPLETED | FAILED | UNSUPPORTED
  # -----------------------------------------------------------------------
  ManifestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${OwnerUser}-file-manifest"
      AttributeDefinitions:
        - AttributeName: file_id
          AttributeType: S
      KeySchema:
        - AttributeName: file_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------------------
  # Dispatcher Lambda
  # Triggered by S3 PutObject on the raw bucket.
  # Deduplicates via DynamoDB, then invokes ConverterFunction async.
  #
  # NOTE: The S3 bucket trigger below uses a notification configuration
  # that requires the raw bucket to have a Lambda permission granted.
  # Since you manage the S3 buckets manually, you must add an S3 event
  # notification on liorm-polus-raw-data pointing to this Lambda ARN
  # after the stack deploys (see README).
  # -----------------------------------------------------------------------
  DispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${OwnerUser}-dispatcher"
      CodeUri: ./src/
      Handler: dispatcher.handler
      Description: "Receives S3 events, deduplicates, invokes converter"
      Environment:
        Variables:
          CONVERTER_FUNCTION: !Ref ConverterFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ManifestTable
        - LambdaInvokePolicy:
            FunctionName: !Ref ConverterFunction

  # Allow S3 to invoke the Dispatcher
  DispatcherS3InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DispatcherFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${RawBucketName}"

  # -----------------------------------------------------------------------
  # Converter Lambda
  # Called async by Dispatcher. Fetches file from raw S3, converts to .txt,
  # uploads to structured S3, updates manifest.
  # Supports: .pdf  .docx  .jpg/.jpeg/.png  .txt (passthrough)
  # -----------------------------------------------------------------------
  ConverterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${OwnerUser}-converter"
      CodeUri: ./src/
      Handler: converter.handler
      Description: "Converts raw files to .txt and writes to structured bucket"
      Timeout: 300
      MemorySize: 1024   # OCR / PDF parsing is memory-hungry
      Layers:
        - !Ref ConverterDepsLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ManifestTable
        - S3ReadPolicy:
            BucketName: !Ref RawBucketName
        - S3WritePolicy:
            BucketName: !Ref StructuredBucketName

  # -----------------------------------------------------------------------
  # Lambda Layer — Python dependencies for conversion
  # Build with:  pip install -r src/requirements.txt -t src/python/
  # Then SAM packages it automatically on `sam build`.
  # -----------------------------------------------------------------------
  ConverterDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${OwnerUser}-converter-deps"
      Description: "pypdf, python-docx, Pillow, pytesseract"
      ContentUri: ./layer/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12

Outputs:
  DispatcherFunctionArn:
    Description: "Paste this ARN into the S3 raw bucket event notification"
    Value: !GetAtt DispatcherFunction.Arn

  ConverterFunctionArn:
    Value: !GetAtt ConverterFunction.Arn

  ManifestTableName:
    Value: !Ref ManifestTable